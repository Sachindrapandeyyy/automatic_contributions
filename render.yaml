services:
  # 1. Backend Web Service (Express Server)
  - type: web
    name: git-auto-committer-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production

  # 2. Frontend Static Site (Vite React Client)
  - type: web
    name: git-auto-committer-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE
        value: https://git-auto-committer-backend.onrender.com/api # Replace with your actual backend Render URL once deployed
